version: 2
updates:
  - package-ecosystem: cargo
    directories:
      - "/"
      - "/arrow-pyarrow-integration-testing"
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    target-branch: main
    labels: [auto-dependencies, arrow]
    groups:
      prost:
        applies-to: version-updates
        patterns:
          - "prost*"
      tonic:
        applies-to: version-updates
        patterns:
          - "tonic*"
      all-other-cargo-deps:
        applies-to: version-updates
        patterns:
          - "*"
        exclude-patterns:
          - "prost*"
          - "tonic*"
          - "object_store"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 10
    labels: [auto-dependencies]
